[project]
name = "pymediate"
version = "0.1.0"
description = "A type-safe mediator pattern implementation for Python 3.13+"
readme = "README.md"
authors = [
    { name = "sina-al", email = "27771210+sina-al@users.noreply.github.com" }
]
license = { text = "MIT" }
requires-python = ">=3.13"
dependencies = []

[project.optional-dependencies]
di = [
    "dependency-injector>=4.41.0",
]

[dependency-groups]
dev = [
    "ruff>=0.8.4",
    "poethepoet>=0.31.1",
    "mypy>=1.13.0",
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-github-actions-annotate-failures>=0.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.poe]
include = "tasks.toml"
