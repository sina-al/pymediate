[project]
name = "shop-adapter-postgres"
version = "0.1.0"
description = "Secondary (outbound) PostgreSQL adapter for the example shop"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["psycopg[binary,pool]>=3.2.0", "shop-domain", "shop-ports"]

[tool.uv.sources]
shop-domain = { workspace = true }
shop-ports = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.adapters.postgres"
