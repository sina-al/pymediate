[project]
name = "shop-adapter-worker"
version = "0.1.0"
description = "Primary (inbound) background-worker adapter for the example shop"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dependency-injector>=4.49.1",
    "opentelemetry-api>=1.36.0",
    "pydantic>=2.0.0",
    "pymediate>=0.5.0",
    "shop-application",
    "shop-bindings",
    "shop-ports",
]

[tool.uv.sources]
shop-application = { workspace = true }
shop-bindings = { workspace = true }
shop-ports = { workspace = true }

[project.scripts]
shop-worker = "shop.worker.app:main"

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.worker"
