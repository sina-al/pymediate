[project]
name = "shop-adapter-cli"
version = "0.1.0"
description = "Primary (inbound) command-line adapter for the example shop"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pymediate",
    "rich>=13.9.0",
    "shop-bindings",
    "shop-application",
    "shop-domain",
    "typer>=0.16.0",
]

[tool.uv.sources]
shop-application = { workspace = true }
shop-domain = { workspace = true }
shop-bindings = { workspace = true }

[project.scripts]
shop = "shop.cli.app:main"

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.cli"
