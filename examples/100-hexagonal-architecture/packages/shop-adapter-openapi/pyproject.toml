[project]
name = "shop-adapter-openapi"
version = "0.1.0"
description = "Primary (inbound) FastAPI and OpenAPI adapter for the example shop"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dependency-injector>=4.49.1",
    "fastapi>=0.115.0",
    "opentelemetry-instrumentation-fastapi>=0.57b0",
    "pymediate>=0.5.0",
    "shop-application",
    "shop-domain",
    "shop-bindings",
    "uvicorn>=0.30.0",
]

[tool.uv.sources]
shop-application = { workspace = true }
shop-domain = { workspace = true }
shop-bindings = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.openapi"
