x-aws-environment: &aws-environment
  SHOP_POSTGRES_URL: postgresql://shop:shop@postgres/shop
  AWS_ACCESS_KEY_ID: minio
  AWS_SECRET_ACCESS_KEY: minio-secret
  SHOP_S3_BUCKET: shop-exports
  SHOP_S3_ENDPOINT: http://minio:9000
  SHOP_AWS_REGION: eu-west-2
  SHOP_SQS_ENDPOINT: http://localstack:4566
  SHOP_SQS_QUEUE_URL: http://localstack:4566/000000000000/shop-events
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=shop,deployment.environment.name=local-aws

x-aws-build-args: &aws-build-args
  UV_IMAGE: ${UV_IMAGE}
  PYTHON_IMAGE: ${PYTHON_IMAGE}
  SHOP_PROFILE: aws

x-aws-openapi-image: &aws-openapi-image
  image: ${SHOP_AWS_OPENAPI_IMAGE}
  build:
    context: ../..
    dockerfile: examples/100-hexagonal-architecture/docker/Dockerfile
    args:
      <<: *aws-build-args
      SHOP_HOST: openapi

x-aws-worker-image: &aws-worker-image
  image: ${SHOP_AWS_WORKER_IMAGE}
  build:
    context: ../..
    dockerfile: examples/100-hexagonal-architecture/docker/Dockerfile
    args:
      <<: *aws-build-args
      SHOP_HOST: worker

x-aws-administration-image: &aws-administration-image
  image: ${SHOP_AWS_ADMINISTRATION_IMAGE}
  build:
    context: ../..
    dockerfile: examples/100-hexagonal-architecture/docker/Dockerfile
    args:
      <<: *aws-build-args
      SHOP_HOST: cli

services:
  minio:
    image: ${MINIO_IMAGE}
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-secret

  minio-init:
    image: ${MINIO_CLIENT_IMAGE}
    depends_on: [minio]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 minio minio-secret; do sleep 1; done;
        mc mb --ignore-existing local/shop-exports

  localstack:
    image: ${LOCALSTACK_IMAGE}
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: eu-west-2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 30s

  sqs-init:
    image: ${AWS_CLI_IMAGE}
    depends_on:
      localstack: { condition: service_healthy }
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-west-2
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        aws --endpoint-url http://localstack:4566 sqs create-queue
        --queue-name shop-events-dlq >/dev/null &&
        DLQ_ARN=$$(aws --endpoint-url http://localstack:4566 sqs get-queue-attributes
        --queue-url http://localstack:4566/000000000000/shop-events-dlq
        --attribute-names QueueArn --query Attributes.QueueArn --output text) &&
        aws --endpoint-url http://localstack:4566 sqs create-queue
        --queue-name shop-events >/dev/null &&
        printf '{"RedrivePolicy":"{\\"deadLetterTargetArn\\":\\"%s\\",\\"maxReceiveCount\\":\\"5\\"}"}'
        "$$DLQ_ARN" >/tmp/shop-redrive-policy.json &&
        aws --endpoint-url http://localstack:4566 sqs set-queue-attributes
        --queue-url http://localstack:4566/000000000000/shop-events
        --attributes file:///tmp/shop-redrive-policy.json

  shop-openapi:
    <<: *aws-openapi-image
    depends_on:
      postgres: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    environment:
      <<: *aws-environment

  shop-relay:
    <<: *aws-worker-image
    depends_on:
      postgres: { condition: service_healthy }
      sqs-init: { condition: service_completed_successfully }
    environment:
      <<: *aws-environment

  shop-worker:
    <<: *aws-worker-image
    depends_on:
      postgres: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
      sqs-init: { condition: service_completed_successfully }
    environment:
      <<: *aws-environment

  shop-administration:
    <<: *aws-administration-image
    depends_on:
      postgres: { condition: service_healthy }
      minio-init: { condition: service_completed_successfully }
    environment:
      <<: *aws-environment
