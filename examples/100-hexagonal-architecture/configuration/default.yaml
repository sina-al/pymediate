# Default zero-infrastructure configuration used by tests and local commands.
providers:
  database:
    impl: shop.adapters.ephemeral.SqliteDbGateway
    lifetime: resource
  unit:
    impl: shop.adapters.ephemeral.SqliteUnitOfWork
    lifetime: factory
    arguments:
      database: { $ref: database }
  catalogue:
    impl: shop.adapters.ephemeral.catalogue.EphemeralCatalogue
  storage:
    impl: shop.adapters.ephemeral.storage.EphemeralStorage
  broker:
    impl: shop.adapters.ephemeral.messaging.EphemeralMessageBroker
    arguments:
      visibility_seconds: 120
      max_delivery_count: 5
  clock:
    impl: shop.adapters.common.clock.SystemClock
  inventory:
    impl: shop.adapters.ephemeral.inventory.EphemeralInventory
  payments:
    impl: shop.adapters.ephemeral.payments.EphemeralPayments
  mailer:
    impl: shop.adapters.ephemeral.mailer.ConsoleMailer
  rates:
    impl: shop.adapters.common.rates.FixedExchangeRates
  renderer:
    impl: shop.adapters.weasyprint.renderer.WeasyPrintDocumentRenderer

bindings:
  application:
    providers:
      database: database
      unit: unit
      catalogue: catalogue
      storage: storage
      clock: clock
      inventory: inventory
      payments: payments
      mailer: mailer
      rates: rates
      renderer: renderer
    resources: []
  relay:
    providers:
      outbox: database
      publisher: broker
    resources: []
  consumer:
    providers:
      queue: broker
      inbox: database
    resources: []
