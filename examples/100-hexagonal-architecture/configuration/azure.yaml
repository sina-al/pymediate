# Complete Azure configuration: PostgreSQL, Blob Storage, and Service Bus.
providers:
  telemetry:
    impl: shop.bindings.opentelemetry.configure_opentelemetry
    lifetime: resource
  database:
    impl: shop.adapters.postgres.PostgresDbGateway
    lifetime: resource
    arguments:
      dsn: { env: SHOP_POSTGRES_URL }
  unit:
    impl: shop.adapters.postgres.PostgresUnitOfWork
    lifetime: factory
    arguments:
      database: { $ref: database }
  catalogue:
    impl: shop.adapters.ephemeral.catalogue.EphemeralCatalogue
  storage:
    impl: shop.adapters.azure.storage.AzureBlobStorage
    lifetime: resource
    arguments:
      container: { env: SHOP_AZURE_BLOB_CONTAINER, default: shop-exports }
      connection_string: { env: SHOP_AZURE_STORAGE_CONNECTION_STRING }
  broker:
    impl: shop.adapters.azure.queue.AzureServiceBusMessageBroker
    lifetime: resource
    arguments:
      queue_name: { env: SHOP_SERVICE_BUS_QUEUE }
      connection_string: { env: SHOP_SERVICE_BUS_CONNECTION_STRING }
      wait_seconds: 20
  clock:
    impl: shop.adapters.common.clock.SystemClock
  inventory:
    impl: shop.adapters.ephemeral.inventory.EphemeralInventory
  payments:
    impl: shop.adapters.ephemeral.payments.EphemeralPayments
  mailer:
    impl: shop.adapters.ephemeral.mailer.ConsoleMailer
  rates:
    impl: shop.adapters.common.rates.FixedExchangeRates
  renderer:
    impl: shop.adapters.weasyprint.renderer.WeasyPrintDocumentRenderer

bindings:
  application:
    providers:
      database: database
      unit: unit
      catalogue: catalogue
      storage: storage
      clock: clock
      inventory: inventory
      payments: payments
      mailer: mailer
      rates: rates
      renderer: renderer
    resources: [telemetry]
  relay:
    providers:
      outbox: database
      publisher: broker
    resources: [telemetry]
  consumer:
    providers:
      queue: broker
      inbox: database
    resources: [telemetry]
