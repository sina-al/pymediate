x-azure-environment: &azure-environment
  SHOP_POSTGRES_URL: postgresql://shop:shop@postgres/shop
  SHOP_AZURE_BLOB_CONTAINER: shop-exports
  SHOP_AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
  SHOP_SERVICE_BUS_QUEUE: shop-events
  SHOP_SERVICE_BUS_CONNECTION_STRING: "Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE;UseDevelopmentEmulator=true;"
  OTEL_RESOURCE_ATTRIBUTES: service.namespace=shop,deployment.environment.name=local-azure

x-azure-build-args: &azure-build-args
  UV_IMAGE: ${UV_IMAGE}
  PYTHON_IMAGE: ${PYTHON_IMAGE}
  SHOP_PROFILE: azure

x-azure-openapi-image: &azure-openapi-image
  image: ${SHOP_AZURE_OPENAPI_IMAGE}
  build:
    context: ../..
    dockerfile: examples/100-hexagonal-architecture/docker/Dockerfile
    args:
      <<: *azure-build-args
      SHOP_HOST: openapi

x-azure-worker-image: &azure-worker-image
  image: ${SHOP_AZURE_WORKER_IMAGE}
  build:
    context: ../..
    dockerfile: examples/100-hexagonal-architecture/docker/Dockerfile
    args:
      <<: *azure-build-args
      SHOP_HOST: worker

x-azure-administration-image: &azure-administration-image
  image: ${SHOP_AZURE_ADMINISTRATION_IMAGE}
  build:
    context: ../..
    dockerfile: examples/100-hexagonal-architecture/docker/Dockerfile
    args:
      <<: *azure-build-args
      SHOP_HOST: cli

services:
  azurite:
    image: ${AZURITE_IMAGE}
    command: azurite-blob --blobHost 0.0.0.0 --loose

  azurite-init:
    image: ${AZURE_CLI_IMAGE}
    depends_on: [azurite]
    environment:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until az storage container create --name shop-exports
        --connection-string "$$AZURE_STORAGE_CONNECTION_STRING"; do sleep 1; done

  mssql:
    image: ${MSSQL_IMAGE}
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ShopServiceBus1!
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 120
      start_period: 30s

  servicebus-emulator:
    image: ${SERVICEBUS_EMULATOR_IMAGE}
    depends_on:
      mssql: { condition: service_healthy }
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: ShopServiceBus1!
      SQL_SERVER: mssql
      EMULATOR_HTTP_PORT: 5300
    volumes:
      - ./docker/azure/servicebus-emulator.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
    restart: on-failure

  shop-openapi:
    <<: *azure-openapi-image
    depends_on:
      postgres: { condition: service_healthy }
      azurite-init: { condition: service_completed_successfully }
    environment:
      <<: *azure-environment

  shop-relay:
    <<: *azure-worker-image
    depends_on:
      postgres: { condition: service_healthy }
      servicebus-emulator: { condition: service_started }
    environment:
      <<: *azure-environment
    restart: on-failure

  shop-worker:
    <<: *azure-worker-image
    depends_on:
      postgres: { condition: service_healthy }
      azurite-init: { condition: service_completed_successfully }
      servicebus-emulator: { condition: service_started }
    environment:
      <<: *azure-environment
    restart: on-failure

  shop-administration:
    <<: *azure-administration-image
    depends_on:
      postgres: { condition: service_healthy }
      azurite-init: { condition: service_completed_successfully }
    environment:
      <<: *azure-environment
