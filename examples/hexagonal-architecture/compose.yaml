# Three deployments of the same application, selected by profile:
#
#   docker compose --profile memory up --build
#   docker compose --profile postgres up --build
#   docker compose --profile neo4j up --build
#
# Every profile serves the same API on http://localhost:8000. The database services
# also publish their ports so the contract tests can run against them from the host
# (see "Testing the adapters for real" in the README).

name: pymediate-shop

services:
  shop-memory:
    build:
      context: .
      args: { APP: shop-memory }
    ports: ["8000:8000"]
    volumes: [exports:/tmp/shop-exports]
    profiles: [memory]

  shop-postgres:
    build:
      context: .
      args: { APP: shop-postgres }
    environment:
      DATABASE_URL: postgresql://shop:shop@postgres:5432/shop
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    volumes: [exports:/tmp/shop-exports]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    profiles: [postgres]

  shop-postgres-worker:
    build:
      context: .
      args: { APP: shop-postgres }
    command: shop-worker
    environment:
      DATABASE_URL: postgresql://shop:shop@postgres:5432/shop
      REDIS_URL: redis://redis:6379/0
    volumes: [exports:/tmp/shop-exports]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    profiles: [postgres]

  shop-neo4j:
    build:
      context: .
      args: { APP: shop-neo4j }
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: shopshop
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    volumes: [exports:/tmp/shop-exports]
    depends_on:
      neo4j: { condition: service_healthy }
      redis: { condition: service_started }
    profiles: [neo4j]

  shop-neo4j-worker:
    build:
      context: .
      args: { APP: shop-neo4j }
    command: shop-worker
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_PASSWORD: shopshop
      REDIS_URL: redis://redis:6379/0
    volumes: [exports:/tmp/shop-exports]
    depends_on:
      neo4j: { condition: service_healthy }
      redis: { condition: service_started }
    profiles: [neo4j]

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 2s
      timeout: 3s
      retries: 15
    profiles: [postgres]

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/shopshop
    ports: ["7687:7687"]
    healthcheck:
      # The HTTP interface answers once bolt is ready; cypher-shell would be a JVM
      # boot per probe and blow the timeout on slower machines.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    profiles: [neo4j]

  redis:
    image: redis:7-alpine
    profiles: [postgres, neo4j]

volumes:
  exports:
