[project]
name = "shop-core"
version = "0.1.0"
description = "The application core: every use case the shop performs, one handler each"
requires-python = ">=3.12"
dependencies = [
    # Loose lower bound per the examples contract: the release pipeline re-pins this to the
    # exact release candidate on TestPyPI (scripts/run_examples.py).
    "pymediate>=0.1",
    "shop-domain",
    "shop-ports",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shop_core"]

[tool.uv.sources]
shop-domain = { workspace = true }
shop-ports = { workspace = true }
