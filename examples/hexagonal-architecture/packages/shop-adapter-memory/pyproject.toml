[project]
name = "shop-adapter-memory"
version = "0.1.0"
description = "Every port implemented in plain Python objects — the test fakes that are also a real deployment"
requires-python = ">=3.12"
dependencies = [
    "shop-domain",
    "shop-ports",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shop_adapter_memory"]

[tool.uv.sources]
shop-domain = { workspace = true }
shop-ports = { workspace = true }
