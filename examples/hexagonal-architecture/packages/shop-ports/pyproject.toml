[project]
name = "shop-ports"
version = "0.1.0"
description = "The interfaces the application owns; adapters implement them from outside"
requires-python = ">=3.12"
dependencies = [
    "shop-domain",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shop_ports"]

[tool.uv.sources]
shop-domain = { workspace = true }
