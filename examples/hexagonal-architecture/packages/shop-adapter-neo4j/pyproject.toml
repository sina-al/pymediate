[project]
name = "shop-adapter-neo4j"
version = "0.1.0"
description = "The persistence ports implemented on Neo4j via the official driver"
requires-python = ">=3.12"
dependencies = [
    "shop-domain",
    "shop-ports",
    "neo4j>=5.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shop_adapter_neo4j"]

[tool.uv.sources]
shop-domain = { workspace = true }
shop-ports = { workspace = true }
