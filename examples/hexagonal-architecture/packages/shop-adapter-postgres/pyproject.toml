[project]
name = "shop-adapter-postgres"
version = "0.1.0"
description = "The persistence ports implemented on PostgreSQL via psycopg"
requires-python = ">=3.12"
dependencies = [
    "shop-domain",
    "shop-ports",
    "psycopg[binary,pool]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shop_adapter_postgres"]

[tool.uv.sources]
shop-domain = { workspace = true }
shop-ports = { workspace = true }
