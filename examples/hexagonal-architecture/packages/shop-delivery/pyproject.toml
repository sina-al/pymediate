[project]
name = "shop-delivery"
version = "0.1.0"
description = "The doorways: Flask routes, a Typer CLI, and a queue worker — none know which adapters are behind the mediator"
requires-python = ">=3.12"
dependencies = [
    "pymediate>=0.1",
    "shop-domain",
    "shop-ports",
    "shop-core",
    "flask>=3.0",
    "typer>=0.15",
    "redis>=5.0",
    "waitress>=3.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shop_delivery"]

[tool.uv.sources]
shop-domain = { workspace = true }
shop-ports = { workspace = true }
shop-core = { workspace = true }
