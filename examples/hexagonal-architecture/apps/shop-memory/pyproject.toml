[project]
name = "shop-memory"
version = "0.1.0"
description = "The shop composed on in-memory adapters — web, worker thread, and CLI in one process"
requires-python = ">=3.12"
dependencies = [
    "shop-core",
    "shop-delivery",
    "shop-adapter-memory",
]

[project.scripts]
shop-web = "shop_app_memory.web:main"
shop = "shop_app_memory.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shop_app_memory"]

[tool.uv.sources]
shop-core = { workspace = true }
shop-delivery = { workspace = true }
shop-adapter-memory = { workspace = true }
