# Shared application model. Cloud files supply host images, wiring, and dependencies.
services:
  postgres:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop"]
      interval: 2s
      timeout: 2s
      retries: 20

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE}
    command: ["--config=/etc/otelcol/config.yaml"]
    environment: { GOMEMLIMIT: 160MiB }
    volumes:
      ["./docker/opentelemetry/collector.yaml:/etc/otelcol/config.yaml:ro"]
    ports:
      ["127.0.0.1:4317:4317", "127.0.0.1:4318:4318", "127.0.0.1:13133:13133"]
    mem_limit: 256m
    read_only: true
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    stop_grace_period: 10s
    restart: unless-stopped

  shop-openapi:
    init: true
    depends_on:
      postgres: { condition: service_healthy }
      otel-collector: { condition: service_started }
    environment:
      {
        SHOP_WIRING: /etc/shop/configuration.yaml,
        OTEL_SDK_DISABLED: "false",
        OTEL_SERVICE_NAME: shop-openapi,
        OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317,
      }
    ports: ["8000:8000"]
    entrypoint: ["uvicorn"]
    command:
      [
        "shop.openapi.web:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]

  shop-relay:
    init: true
    restart: on-failure
    depends_on:
      postgres: { condition: service_healthy }
      otel-collector: { condition: service_started }
    environment:
      {
        SHOP_WIRING: /etc/shop/configuration.yaml,
        OTEL_SDK_DISABLED: "false",
        OTEL_SERVICE_NAME: shop-relay,
        OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317,
      }
    entrypoint: ["shop-worker"]
    command: ["relay"]

  shop-worker:
    init: true
    restart: on-failure
    depends_on:
      postgres: { condition: service_healthy }
      otel-collector: { condition: service_started }
    environment:
      {
        SHOP_WIRING: /etc/shop/configuration.yaml,
        OTEL_SDK_DISABLED: "false",
        OTEL_SERVICE_NAME: shop-worker,
        OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317,
      }
    entrypoint: ["shop-worker"]
    command: ["consume"]

  shop-administration:
    init: true
    depends_on:
      postgres: { condition: service_healthy }
      otel-collector: { condition: service_started }
    environment:
      {
        SHOP_WIRING: /etc/shop/configuration.yaml,
        OTEL_SDK_DISABLED: "false",
        OTEL_SERVICE_NAME: shop-administration,
        OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317,
      }
    entrypoint: ["python", "-c"]
    command: ["import signal; signal.pause()"]
