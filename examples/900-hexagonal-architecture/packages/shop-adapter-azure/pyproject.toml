[project]
name = "shop-adapter-azure"
version = "0.1.0"
description = "Secondary (outbound) Azure Blob Storage and Service Bus adapters for the example shop"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.9.0",
    "azure-identity>=1.19.0",
    "azure-servicebus>=7.14.0",
    "azure-storage-blob>=12.25.0",
    "shop-ports",
]

[tool.uv.sources]
shop-ports = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.adapters.azure"
