[project]
name = "shop-adapter-common"
version = "0.1.0"
description = "Secondary stateless support adapters shared by every example shop deployment"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["shop-ports"]

[tool.uv.sources]
shop-ports = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.adapters.common"
