[project]
name = "shop-ports"
version = "0.1.0"
description = "Use-case-specific outbound contracts for the example shop"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["shop-domain"]

[tool.uv.sources]
shop-domain = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.ports"
