[project]
name = "shop-adapter-aws"
version = "0.1.0"
description = "Secondary (outbound) Amazon S3 and SQS adapters for the example shop"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["boto3>=1.35.0", "shop-ports"]

[tool.uv.sources]
shop-ports = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.adapters.aws"
