[project]
name = "shop-application"
version = "0.1.0"
description = "Shop use cases, application services, and mediator behaviours"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dependency-injector>=4.49.1",
    "opentelemetry-api>=1.36.0",
    "pymediate>=0.5.0",
    "shop-domain",
    "shop-ports",
    "structlog>=25.4.0",
]

[tool.uv.sources]
shop-domain = { workspace = true }
shop-ports = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.26,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "shop.application"
