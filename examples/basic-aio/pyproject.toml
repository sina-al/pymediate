[project]
name = "pymediate-example-basic-aio"
version = "0.1.0"
description = "Asynchronous PyMediate example: async handlers, awaited dispatch, and a selective pipeline behavior"
requires-python = ">=3.12"
dependencies = [
    # Loose lower bound per the examples contract: the release pipeline re-pins this to the
    # exact release candidate on TestPyPI (scripts/run_examples.py).
    "pymediate>=0.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=1.0.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.uv]
# An example is an application, not a distributable package: nothing to build or install.
package = false
