[project]
name = "pymediate-example-with-dependency-injector"
version = "0.1.0"
description = "PyMediate's di extra: handlers resolved from a dependency-injector container"
requires-python = ">=3.12"
dependencies = [
    # The [di] extra pulls in dependency-injector. Loose lower bound per the examples
    # contract: the release pipeline re-pins this to the exact release candidate on
    # TestPyPI (scripts/run_examples.py) — uv keeps the extra when it re-pins.
    "pymediate[di]>=0.5.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[tool.uv]
# An example is an application, not a distributable package: nothing to build or install.
package = false

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]

[tool.ruff.format]
quote-style = "double"
