# git-cliff configuration for pymediate.
# Generates CHANGELOG.md from Conventional Commits (already enforced on PR titles by
# .github/workflows/pr.yml). Regenerate with `uv run poe changelog`.
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. Generated from Conventional
Commits with [git-cliff](https://git-cliff.org/) — do not hand-edit above the first entry.
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}**breaking:** {% endif %}\
            {{ commit.message | upper_first }} \
            ([{{ commit.id | truncate(length=7, end="") }}](<REPO>/commit/{{ commit.id }}))
    {% endfor %}
{% endfor %}
"""
trim = true
render_always = true
postprocessors = [
    { pattern = '<REPO>', replace = "https://github.com/sina-al/pymediate" },
]

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = false
# Only user-facing types reach the changelog: a test/build/style/ci/chore commit (even one
# touching the package) isn't something a `pip install pymediate` consumer needs to read
# about, and neither is the release bump itself (chore(release)). Path filtering — only
# commits touching src/pymediate/** — is applied at invocation time (see
# scripts/generate_changelog.py and the release:notes poe task), so a docs/readme/workflow/
# script-only change never produces an entry either, regardless of its type.
commit_parsers = [
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^revert", group = "Reverts" },
    { message = "^style|^test|^build|^ci|^chore", skip = true },
    { message = ".*", skip = true },
]
filter_commits = false
fail_on_unmatched_commit = false
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
