# git-cliff configuration for pymediate.
#
# Renders changelogs from Conventional Commits (already enforced on PR titles by
# .github/workflows/pr.yml). There is NO committed CHANGELOG.md and no docs-site changelog
# page: the GitHub Release for each tag is the canonical, browsable changelog (see
# OPERATIONS.md § "Release notes"). git-cliff is invoked in exactly two places, both on a
# single release's commits:
#
#   1. prepare-release.yml — `<last-released-tag>.. --tag vX.Y.Z --strip all` into the
#      release PR body (the "## Changelog" section). `--strip all` drops the footer because
#      the compare link would point at a tag that does not exist yet (the release isn't
#      tagged until merge).
#   2. release:notes poe task — `<last-released-tag>.. --tag vX.Y.Z --strip header` into the
#      GitHub Release body. Keeps the footer, whose compare link is valid because the tag now
#      exists.
#
# Both anchor the range on the last tag with a *published* GitHub Release (queried via `gh
# release list`), not simply the last git tag: tag-release.yml tags a release's merge commit
# before release.yml runs, so a version that reaches TestPyPI (burning it) and then fails
# downstream leaves a real tag with no Release. Basing the range on that raw tag would
# silently drop its content from every future release's changelog (this shipped once as
# v0.7.1's empty notes, when nothing since burned v0.7.0 touched src/pymediate/).
#
# Both invocations pass `--include-path 'src/pymediate/**'` (QUOTED — an unquoted glob is
# expanded by the caller's shell / poethepoet into absolute paths that match no commit,
# silently emptying the changelog; that shipped once as v0.1.5's empty "[Unreleased]" notes).
# Path filtering keeps consumer-irrelevant commits (docs-site, workflows, scripts) out
# regardless of their type.
#
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented here. Generated from Conventional
Commits with [git-cliff](https://git-cliff.org/) — do not hand-edit above the first entry.
"""
# No per-version "## [x.y.z]" heading: each render is a single release, and its version is
# already the GitHub Release title / the release PR title. Breaking changes are hoisted into
# their own section (ZeroVer makes a breaking change the whole signal of a minor bump) and
# excluded from their type group below so they aren't listed twice. `(#N)` PR/issue refs that
# squash-merge subjects carry are linkified by the postprocessor.
body = """
{%- macro commit_line(commit) -%}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](<REPO>/commit/{{ commit.id }}))
{%- endmacro -%}
{% set breaking = commits | filter(attribute="breaking", value=true) -%}
{% if breaking | length > 0 %}
### ⚠️ Breaking Changes
{% for commit in breaking %}
{{ self::commit_line(commit=commit) }}
{%- endfor %}
{% endif -%}
{% for group, group_commits in commits | filter(attribute="breaking", value=false) | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in group_commits %}
{{ self::commit_line(commit=commit) }}
{%- endfor %}
{% endfor %}
"""
# Footer context is the release list (not a single version): releases[0] is the release being
# rendered. Guarded so the first-ever release (no previous) omits the link instead of emitting
# a broken compare.
footer = """
{% if releases[0].version and releases[0].previous.version %}
**Full Changelog**: <REPO>/compare/{{ releases[0].previous.version }}...{{ releases[0].version }}
{% endif -%}
"""
trim = true
render_always = true
postprocessors = [
    { pattern = '\(#(\d+)\)', replace = "([#${1}](https://github.com/sina-al/pymediate/issues/${1}))" },
    { pattern = '<REPO>', replace = "https://github.com/sina-al/pymediate" },
]

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = false
# Only user-facing types reach the changelog: a test/build/style/ci/chore commit (even one
# touching the package) isn't something a `pip install pymediate` consumer needs to read
# about, and neither is the release bump itself (chore(release)) or dependency bumps
# (chore(deps)). Path filtering (src/pymediate/** only) is applied at invocation time, so a
# docs-site/readme/workflow/script-only change never produces an entry either.
commit_parsers = [
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps.*\\)", skip = true },
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^revert", group = "Reverts" },
    { message = "^style|^test|^build|^ci|^chore", skip = true },
    { message = ".*", skip = true },
]
filter_commits = false
fail_on_unmatched_commit = false
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
