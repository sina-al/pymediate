# Dedicated mypy config for the snippet harness (tests/mypy/test_mypy.py).
#
# run_mypy_on_file passes this file via --config-file so the repo-root
# mypy.ini is never consulted. The root config's [mypy-tests.*] section
# disables error codes (call-arg, arg-type, override, misc) for the main
# test suite, and mypy resolves the snippet files as tests.mypy.snippets.*
# namespace-package modules — so without this isolation those suppressions
# silently mask exactly the errors the snippets exist to catch.
[mypy]
python_version = 3.12
show_error_codes = True
