[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
# python_classes = Test*  # Disabled: prefer function-based tests
python_functions = test_*

# Test execution configuration
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers (add custom markers here)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    asyncio: marks tests as async tests
    requires_di: marks tests that require dependency-injector package
