[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ignore async tests temporarily (work in progress)
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --ignore=tests/test_async_handlers.py

# Markers (add custom markers here)
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    asyncio: marks tests as async tests (temporarily disabled)
