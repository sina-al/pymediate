[tool.poe.tasks]

# ========== Testing ==========

test.help = "Run all tests"
test.cmd = "pytest tests/"

"test:cov".help = "Run tests with coverage report"
"test:cov".cmd = "pytest --cov=pymediate --cov-report=term-missing --cov-report=html"

"test:watch".help = "Run tests in watch mode"
"test:watch".cmd = "pytest-watch tests/"

"test:verbose".help = "Run tests with verbose output"
"test:verbose".cmd = "pytest tests/ -v"

"test:fast".help = "Run tests without coverage (fast)"
"test:fast".cmd = "pytest tests/ -x"

"test:failed".help = "Run only failed tests from last run"
"test:failed".cmd = "pytest --lf tests/"

"test:specific".help = "Run specific test file (usage: poe test:specific test_handler.py)"
"test:specific".cmd = "pytest tests/${test_file} -v"
"test:specific".args = [
    { name = "test_file", positional = true, required = true },
]

"test:release".help = "Run tests with coverage, gated at the release coverage floor (95%)"
"test:release".cmd = "pytest --cov=pymediate --cov-report=term-missing --cov-fail-under=95"

# ========== Type Checking ==========

type.help = "Run mypy type checking on source code"
type.cmd = "mypy src/pymediate/ --strict"

"type:all".help = "Run mypy on source and tests"
"type:all".cmd = "mypy src/pymediate/ tests/ --strict --exclude 'tests/mypy/snippets/errors/'"

"type:report".help = "Generate mypy coverage report"
"type:report".cmd = "mypy src/pymediate/ --strict --html-report mypy-report"

# ========== Linting & Formatting ==========

lint.help = "Run ruff linter (check only)"
lint.cmd = "ruff check src/ tests/ scripts/"

"lint:fix".help = "Run ruff linter and auto-fix issues"
"lint:fix".cmd = "ruff check --fix src/ tests/ scripts/"

format.help = "Run ruff formatter"
format.cmd = "ruff format src/ tests/ scripts/"

"format:check".help = "Check formatting without making changes"
"format:check".cmd = "ruff format --check src/ tests/ scripts/"

fix.help = "Run linter with fixes and formatter (full cleanup)"
fix.sequence = ["lint:fix", "format"]

# ========== Quality Checks ==========

check.help = "Run all quality checks (type, lint, format check)"
check.sequence = ["type", "lint", "format:check"]

"check:all".help = "Run all quality checks plus tests with coverage"
"check:all".sequence = ["type:all", "lint", "format:check", "test:cov"]

ci.help = "Run full CI suite (same as CI pipeline)"
ci.sequence = ["check:all"]

# ========== Documentation ==========

"docs:serve".help = "Start MkDocs dev server with live reload"
"docs:serve".cmd = "mkdocs serve"

"docs:build".help = "Build documentation site"
"docs:build".cmd = "mkdocs build --strict"

"docs:deploy".help = "Deploy documentation to GitHub Pages"
"docs:deploy".cmd = "mkdocs gh-deploy --force"

"docs:clean".help = "Clean built documentation"
"docs:clean".cmd = "rm -rf site/"

# ========== Release ==========

"release:impact".help = "Recommend minor vs. patch by diffing commits/API surface since the last tag (usage: poe release:impact --from vX.Y.Z --to REV)"
"release:impact".cmd = "python3 scripts/release_impact.py"

changelog.help = "Regenerate CHANGELOG.md from Conventional Commits (git-cliff)"
changelog.cmd = "python3 scripts/generate_changelog.py"

"version:bump".help = "Bump the version in pyproject.toml + __init__.py (usage: poe version:bump patch|minor|major|X.Y.Z)"
"version:bump".cmd = "python3 scripts/bump_version.py"

"release:verify-version".help = "Verify release tag, pyproject.toml, and __init__.py versions match (usage: poe release:verify-version --tag vX.Y.Z)"
"release:verify-version".cmd = "python3 scripts/verify_release_version.py"

# ========== Development ==========

install.help = "Install package in editable mode with dev dependencies"
install.cmd = "uv sync --all-extras --group test"

"update-uv".help = "Bump the pinned uv version (pyproject.toml + local install) to the latest release"
"update-uv".cmd = "python3 scripts/update_uv.py"

"update-uv:check".help = "Check whether the pinned uv version is behind the latest release"
"update-uv:check".cmd = "python3 scripts/update_uv.py --check"

"context:update".help = "Regenerate CLAUDE.md's API signatures block from src/pymediate/"
"context:update".cmd = "python3 scripts/update_context.py"

"context:check".help = "Fail if CLAUDE.md's API signatures block is stale"
"context:check".cmd = "python3 scripts/update_context.py --check"

"api:check".help = "Check the public API for breaking changes against a git ref (default: latest tag; usage: poe api:check -a origin/main)"
"api:check".cmd = "uvx --from griffe==2.1.0 griffe check pymediate -s src"

clean.help = "Clean build artifacts, cache files, and coverage reports"
clean.cmd = """
    rm -rf build/ dist/ *.egg-info .pytest_cache .mypy_cache .ruff_cache \
    htmlcov/ .coverage coverage.xml mypy-report/ site/
"""

"clean:all".help = "Clean everything including venv"
"clean:all".sequence = ["clean"]

# ========== Quick Commands ==========

dev.help = "Quick dev workflow: fix code and run tests"
dev.sequence = ["fix", "test:fast"]

pr.help = "Prepare for PR: run all checks"
pr.sequence = ["fix", "check:all"]

all.help = "Run everything: fix, check, and test with coverage"
all.sequence = ["fix", "check:all"]
