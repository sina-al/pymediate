version: 2
updates:
  - package-ecosystem: "uv"
    # "/" is the library itself; "/examples/*" keeps each example's committed uv.lock
    # tracking the latest third-party dependencies. pymediate itself is the in-branch
    # editable source in every example (not a registry dependency), so Dependabot never
    # bumps it here — only each example's other deps move.
    directories:
      - "/"
      - "/examples/*"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "npm"
    # The docs site's pnpm lockfile. Without this, a vulnerable transitive dep here
    # surfaces for the first time at the release gate (dependency-review on the
    # release PR) — the most expensive moment to learn about it.
    directory: "/docs"
    schedule:
      interval: "weekly"
    groups:
      docs-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "javascript"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
      - "github-actions"
