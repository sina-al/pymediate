name: Release

# Publishing pipeline, started by tag-release.yml pushing a vX.Y.Z tag (the tag points at
# a merge commit on `stable` whose tree the release PR's required checks already ran on).
#
# Order is deliberate (see OPERATIONS.md): everything that can fail runs BEFORE anything
# user-visible is created, and the GitHub Release is created last so a rejected or failed
# release leaves nothing behind except the tag and (past that stage) a burned TestPyPI
# version — TestPyPI/PyPI filenames are immutable forever, so a version that reached
# TestPyPI is dead and the retry is simply the next version.
#
#   validate -> build (+ provenance attestation) -> install matrix + examples vs wheel
#     -> TestPyPI -> examples vs TestPyPI -> [pypi environment gate] -> PyPI
#     -> examples vs PyPI -> GitHub Release
#
# The examples suite runs three times, each answering a different question (the release
# PR's required "Examples" check already asked "does this code break downstream users?"
# pre-merge): the wheel stage re-asks it against the release-versioned artifact and
# today's dependency resolution, before any version burns; the TestPyPI stage validates
# the publish-and-install path; the PyPI stage smoke-tests the exact artifact users
# install, and gates the GitHub Release on it.
on:
  push:
    tags:
      - "v*.*.*"
  # Manual fallback: dispatch *on a tag ref* (gh workflow run release.yml --ref vX.Y.Z)
  # so github.ref_name is the version tag the consistency check expects. Dispatched on a
  # branch (e.g. reflexively instead of prepare-release.yml), validate-release's first
  # step fails within seconds — nothing downstream can run, nothing publishes.
  workflow_dispatch:

# Least privilege by default; jobs that need more grant it themselves.
permissions:
  contents: read

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Require a version-tag ref
        # Fail in seconds if this run isn't on a version tag. workflow_dispatch exists only
        # as the manual fallback for a lost tag-push event (gh workflow run release.yml
        # --ref vX.Y.Z); dispatched on a branch this pipeline could never publish anything
        # (the version-consistency check below fails first), but it would churn through the
        # full test suite before saying so — an alarming few minutes for whoever meant to
        # dispatch prepare-release.yml.
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" != "tag" ]; then
            echo "::error::release.yml started on ${REF_TYPE} '${REF_NAME}', not a version tag. To cut a release, dispatch prepare-release.yml; release.yml's own dispatch is only the recovery path for a lost tag event (gh workflow run release.yml --ref vX.Y.Z)."
            exit 1
          fi
          echo "Running on tag ${REF_NAME}."

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras --group test

      - name: Run full test suite
        run: |
          uv run poe test:release

      - name: Run type checking
        run: |
          uv run poe type:all

      - name: Run linting
        run: |
          uv run poe lint
          uv run poe format:check

      - name: Verify version consistency
        # The version is tag-derived (hatch-vcs), so there are no version strings in the repo
        # to cross-check anymore; instead assert that the version hatch-vcs computes from THIS
        # checkout equals the tag that triggered the run.
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          BUILT_VERSION=$(uvx --with hatch-vcs hatchling version)
          if [ "$BUILT_VERSION" != "${VERSION_TAG#v}" ]; then
            echo "Tag $VERSION_TAG does not match hatch-vcs version $BUILT_VERSION" >&2
            exit 1
          fi
          echo "Version OK: $BUILT_VERSION"

  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
      # Sign build provenance attestations (verifiable with `gh attestation verify`):
      # cryptographic proof that these artifacts were built by this workflow in this repo.
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # hatch-vcs derives the version from git tags; a shallow checkout would build a
          # bogus dev version instead of the release version.
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Build package
        run: uv run poe build

      - name: Check package with twine
        run: uv run poe build:check

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  test-install:
    name: Test Package Installation
    runs-on: ${{ matrix.os }}
    needs: build-package
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Install package (wheel)
        shell: bash
        run: |
          pip install dist/*.whl

      - name: Test import
        run: |
          python -c "from pymediate import Request, RequestHandler, Mediator, Services; print('Core import successful')"

      - name: Install with DI extra
        shell: bash
        run: |
          wheel=$(ls dist/*.whl)
          pip install "${wheel}[di]"

      - name: Test DI import
        run: |
          python -c "from pymediate.providers import DependencyInjectorServiceProvider; print('DI import successful')"

  examples-wheel:
    name: Examples against the built wheel
    # The same examples the release PR's required "Examples" check already ran, but against
    # the artifact this run just built (real release version, not the PR wheel's dev
    # version) and today's dependency resolution — a release PR that sat open lets the
    # examples' unpinned-by-design dependencies drift between check time and tag time.
    # Failing here is free; the same failure one stage later burns the version.
    runs-on: ubuntu-latest
    needs: build-package

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Run examples suite against the built wheel
        run: |
          uv sync --only-dev
          uv run poe examples:test --wheel dist/*.whl

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [validate-release, build-package, test-install, examples-wheel]
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pymediate/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        # pypa's canonical publisher: same OIDC Trusted Publishing as `uv publish`, plus
        # PEP 740 attestations on upload — and the publishing pattern OpenSSF Scorecard's
        # Packaging check recognizes. No checkout needed; it publishes dist/ as-is.
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  examples-testpypi:
    name: Examples against TestPyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Wait for TestPyPI to serve the release
        # The simple index is CDN-cached and can lag the upload by minutes; see
        # scripts/wait_for_index.py for why the probe must be uv itself (PEP 503 vs
        # PEP 691 CDN variants; bit v0.3.0 and v0.4.0).
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          uv run poe release:wait-index --version "${VERSION_TAG#v}" \
            --index https://test.pypi.org/simple/

      - name: Run examples suite against the TestPyPI release
        # Each examples/<name>/ is a standalone uv project re-pinned to the version just
        # published on TestPyPI (only pymediate resolves there; its dependencies come from
        # real PyPI). This validates the publish-and-install path — the code itself already
        # passed the wheel stage.
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          uv run poe examples:test --version "${VERSION_TAG#v}" \
            --index https://test.pypi.org/simple/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: examples-testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/pymediate/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # See the TestPyPI job for why the pypa action replaced `uv publish`.
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1

  examples-pypi:
    name: Examples against PyPI
    # Post-publish smoke test: the only stage that exercises the exact artifact users
    # install, from the index they install it from. It gates the GitHub Release — the
    # announcement should only exist once the announced thing is proven installable. A
    # failure here can't unpublish (PyPI files are immutable), it just withholds the
    # GitHub Release: fix whatever broke (or accept the finding) and re-run the failed
    # jobs to resume.
    runs-on: ubuntu-latest
    needs: publish-pypi

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Wait for PyPI to serve the release
        # Same CDN-lag probe as the TestPyPI stage (see scripts/wait_for_index.py). PyPI
        # usually propagates faster than TestPyPI, but the failure mode is identical.
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          uv run poe release:wait-index --version "${VERSION_TAG#v}" \
            --index https://pypi.org/simple/

      - name: Run examples suite against the PyPI release
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          uv run poe examples:test --version "${VERSION_TAG#v}" \
            --index https://pypi.org/simple/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Last on purpose: a release that never reached PyPI — or reached it but failed the
    # PyPI smoke test — should not present itself to the world as released. Everything
    # before the pypi gate is retractable-by-design.
    needs: examples-pypi
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        run: uv run poe release:notes

      - name: Attach provenance bundles to the release assets
        # build-package attested these artifacts; fetch each one's Sigstore bundle from the
        # attestation store into dist/ as <artifact>.intoto.jsonl so the release publishes
        # artifact + provenance side by side (verifiable offline with `gh attestation
        # verify <artifact> -b <bundle>`; also what Signed-Releases scanners look for).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for artifact in dist/*.whl dist/*.tar.gz; do
            gh attestation download "$artifact" --repo "$GITHUB_REPOSITORY"
            digest=$(sha256sum "$artifact" | awk '{print $1}')
            mv "sha256:${digest}.jsonl" "${artifact}.intoto.jsonl"
          done

      - name: Create Release
        # Plain `gh release create` instead of a third-party action: one less thing in the
        # supply chain of the release path (zizmor's superfluous-actions audit).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          args=()
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            args+=(--prerelease)
          fi
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            "${args[@]}"
