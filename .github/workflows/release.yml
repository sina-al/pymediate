name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: |
          uv sync --all-extras --group test

      - name: Run full test suite
        run: |
          uv run poe test:release

      - name: Run type checking
        run: |
          uv run poe type:all

      - name: Run linting
        run: |
          uv run poe lint
          uv run poe format:check

      - name: Verify version consistency
        run: |
          VERSION_TAG="${{ github.ref_name }}"
          VERSION_TAG="${VERSION_TAG#v}"

          # Check pyproject.toml version
          PYPROJECT_VERSION=$(grep "^version = " pyproject.toml | cut -d'"' -f2)

          # Check __init__.py version
          INIT_VERSION=$(grep "__version__ = " src/pymediate/__init__.py | cut -d'"' -f2)

          echo "Tag version: $VERSION_TAG"
          echo "pyproject.toml version: $PYPROJECT_VERSION"
          echo "__init__.py version: $INIT_VERSION"

          if [ "$VERSION_TAG" != "$PYPROJECT_VERSION" ]; then
            echo "Error: Tag version doesn't match pyproject.toml"
            exit 1
          fi

          if [ "$VERSION_TAG" != "$INIT_VERSION" ]; then
            echo "Error: Tag version doesn't match __init__.py"
            exit 1
          fi

  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: validate-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Check package with twine
        run: |
          twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  test-install:
    name: Test Package Installation
    runs-on: ${{ matrix.os }}
    needs: build-package
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install package (wheel)
        shell: bash
        run: |
          pip install dist/*.whl

      - name: Test import
        run: |
          python -c "from pymediate import Request, Handler, Mediator, Services; print('Core import successful')"

      - name: Install with DI extra
        shell: bash
        run: |
          pip install "dist/*.whl[di]"

      - name: Test DI import
        run: |
          python -c "from pymediate.providers import DependencyInjectorServiceProvider; print('DI import successful')"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-release, build-package, test-install]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          echo "Generating changelog for $VERSION"

          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release
            CHANGELOG=$(git log --pretty=format:"* %s (%h)" --no-merges)
          else
            # Generate changelog from previous tag
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" --no-merges)
          fi

          # Save to file
          echo "$CHANGELOG" > CHANGELOG.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: CHANGELOG.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

