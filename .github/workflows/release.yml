name: Release

# Publishing pipeline, started by tag-release.yml pushing a vX.Y.Z tag (the tag points at
# a merge commit on `stable` whose tree the release PR's required checks already ran on).
#
# Order is deliberate (see OPERATIONS.md): everything that can fail runs BEFORE anything
# user-visible is created, and the GitHub Release is created last so a rejected or failed
# release leaves nothing behind except the tag and (past that stage) a burned TestPyPI
# version — TestPyPI/PyPI filenames are immutable forever, so a version that reached
# TestPyPI is dead and the retry is simply the next version.
#
#   validate -> build (+ provenance attestation) -> install matrix -> TestPyPI
#     -> examples suite against TestPyPI -> [pypi environment gate] -> PyPI -> GitHub Release
on:
  push:
    tags:
      - "v*.*.*"
  # Manual fallback: dispatch *on a tag ref* (gh workflow run release.yml --ref vX.Y.Z)
  # so github.ref_name is the version tag the consistency check expects.
  workflow_dispatch:

# Least privilege by default; jobs that need more grant it themselves.
permissions:
  contents: read

jobs:
  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras --group test

      - name: Run full test suite
        run: |
          uv run poe test:release

      - name: Run type checking
        run: |
          uv run poe type:all

      - name: Run linting
        run: |
          uv run poe lint
          uv run poe format:check

      - name: Verify version consistency
        # The version is tag-derived (hatch-vcs), so there are no version strings in the repo
        # to cross-check anymore; instead assert that the version hatch-vcs computes from THIS
        # checkout equals the tag that triggered the run.
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          BUILT_VERSION=$(uvx --with hatch-vcs hatchling version)
          if [ "$BUILT_VERSION" != "${VERSION_TAG#v}" ]; then
            echo "Tag $VERSION_TAG does not match hatch-vcs version $BUILT_VERSION" >&2
            exit 1
          fi
          echo "Version OK: $BUILT_VERSION"

  build-package:
    name: Build Package
    runs-on: ubuntu-latest
    needs: validate-release
    permissions:
      contents: read
      # Sign build provenance attestations (verifiable with `gh attestation verify`):
      # cryptographic proof that these artifacts were built by this workflow in this repo.
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # hatch-vcs derives the version from git tags; a shallow checkout would build a
          # bogus dev version instead of the release version.
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Build package
        run: uv run poe build

      - name: Check package with twine
        run: uv run poe build:check

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  test-install:
    name: Test Package Installation
    runs-on: ${{ matrix.os }}
    needs: build-package
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Install package (wheel)
        shell: bash
        run: |
          pip install dist/*.whl

      - name: Test import
        run: |
          python -c "from pymediate import Request, Handler, Mediator, Services; print('Core import successful')"

      - name: Install with DI extra
        shell: bash
        run: |
          wheel=$(ls dist/*.whl)
          pip install "${wheel}[di]"

      - name: Test DI import
        run: |
          python -c "from pymediate.providers import DependencyInjectorServiceProvider; print('DI import successful')"

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [validate-release, build-package, test-install]
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pymediate/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        run: |
          uv publish --index testpypi --trusted-publishing always

  examples:
    name: Examples against TestPyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Wait for TestPyPI to serve the release
        # The simple index is CDN-cached and can lag the upload by minutes; resolving
        # before it propagates fails the whole job (v0.2.0 needed two reruns for this).
        # Poll the same URL uv resolves against until the version's files appear.
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          version="${VERSION_TAG#v}"
          for attempt in $(seq 1 40); do
            if curl -fsS "https://test.pypi.org/simple/pymediate/" | grep -qF "pymediate-${version}.tar.gz"; then
              echo "TestPyPI serves pymediate ${version} (attempt ${attempt})."
              exit 0
            fi
            echo "TestPyPI does not serve ${version} yet (attempt ${attempt}/40); retrying in 15s."
            sleep 15
          done
          echo "::error::TestPyPI never served pymediate ${version} after 10 minutes."
          exit 1

      - name: Run examples suite against the TestPyPI release
        # Each examples/<name>/ is a standalone uv project pinned to the version just
        # published on TestPyPI (only pymediate resolves there; its dependencies come from
        # real PyPI). The examples contract and runner land with ops-overhaul phase 4
        # (issue #24); until then this passes with a notice.
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          if ! ls examples/*/pyproject.toml >/dev/null 2>&1; then
            echo "::notice::No examples/ projects yet (see issue #24); skipping examples stage."
            exit 0
          fi
          uv sync --only-dev
          uv run python scripts/run_examples.py --version "${VERSION_TAG#v}" \
            --index https://test.pypi.org/simple/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: examples
    environment:
      name: pypi
      url: https://pypi.org/p/pymediate/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: |
          uv publish --trusted-publishing always

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Last on purpose: a release that never reached PyPI should not present itself to the
    # world as released. Everything before the pypi gate is retractable-by-design.
    needs: publish-pypi
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        run: uv run poe release:notes

      - name: Create Release
        # Plain `gh release create` instead of a third-party action: one less thing in the
        # supply chain of the release path (zizmor's superfluous-actions audit).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          args=()
          if [[ "$TAG" == *alpha* || "$TAG" == *beta* || "$TAG" == *rc* ]]; then
            args+=(--prerelease)
          fi
          gh release create "$TAG" dist/* \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag \
            "${args[@]}"
