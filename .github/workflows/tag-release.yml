name: Tag Release

# Second half of the release flow: when a release PR (opened by prepare-release.yml)
# is merged, tag the squash commit as vX.Y.Z. The tag is created with a short-lived token
# minted for the pymediate-releaser GitHub App for two reasons: the App is a tag-guard
# bypass actor (so the tag clears the ruleset), and — unlike GITHUB_TOKEN — the resulting
# tag-push event actually triggers release.yml's `on: push: tags` pipeline (GITHUB_TOKEN
# events don't start workflows).
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  tag:
    name: Tag merged release
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.PYMEDIATE_RELEASER_APP_ID }}
          private-key: ${{ secrets.PYMEDIATE_RELEASER_PRIVATE_KEY }}
          # Scope the token to only what tagging needs: create the tag ref (contents).
          permission-contents: write

      - name: Create release tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [[ ! "$HEAD_REF" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Head ref '$HEAD_REF' is not a valid release branch name" >&2
            exit 1
          fi
          TAG="${HEAD_REF#release/}"
          echo "Tagging $MERGE_SHA as $TAG"
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="$MERGE_SHA"
