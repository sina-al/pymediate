name: PR

on:
  pull_request:
    # `stable` only receives release PRs (cuts of main opened by prepare-release.yml);
    # running the same checks there is what makes the release PR the green gate.
    branches: [main, stable]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: "pr-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

# Least privilege by default; jobs that need more grant it themselves.
permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    # Skipping here also skips every job below that depends on its outputs, which is how
    # draft PRs avoid running the heavy jobs (test-coverage-diff, breaking-changes,
    # dependency-review, security-scan) until marked ready for review.
    if: github.event.pull_request.draft == false
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED=$(git diff --name-only "origin/${BASE_REF}"...HEAD)
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(src/|tests/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -qE '^(pyproject\.toml|uv\.lock)$'; then
            echo "deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "deps=false" >> "$GITHUB_OUTPUT"
          fi

  pr-metadata:
    name: PR Metadata Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: ]]; then
            echo "Error: PR title must follow conventional commits format"
            echo "Examples: 'feat: add async support', 'fix(handler): correct type validation'"
            exit 1
          fi

      - name: Check PR has description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "Error: PR must have a description"
            exit 1
          fi

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    # Release PRs (base stable) are the accumulated delta since the last release — large by
    # construction, so size warnings would be pure noise there.
    if: github.base_ref != 'stable'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Check PR size
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: uv run poe pr:size --base "$BASE_REF"

  test-coverage-diff:
    name: Test Coverage Diff
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout PR code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras --all-groups

      - name: Run tests with coverage
        run: uv run poe test:cov-json

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report-pr
          path: coverage.json

      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@50d15ff8768f6d897b04e5a0805bd1a98f7096c4 # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 95
          MINIMUM_ORANGE: 90

      - name: Store comment for fork PRs
        # On fork PRs the GITHUB_TOKEN is read-only, so the action can't comment directly;
        # it writes the comment to a file instead, and coverage-comment.yml (workflow_run,
        # which does have write access) picks this artifact up and posts it.
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

  breaking-changes:
    name: Check for Breaking Changes
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Check public API for breaking changes
        # Signature-level diff of the public API against the PR's base ref, via griffe
        # (griffelib, a direct dev-group dependency). Informational only, same as
        # before: ZeroVer allows breaking changes with a minor bump, so this warns
        # rather than fails the build.
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: uv run poe api:check -a "$BASE_REF" -f github || true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    permissions:
      contents: read
      # Only release PRs get a sticky comment (see release-pr-report.yml for the rest of that
      # bundle); regular PRs keep today's behavior, a check-run summary only.
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: ${{ startsWith(github.head_ref, 'release/v') && 'always' || 'never' }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.deps == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras --all-groups

      - name: Run safety check
        # Not blocking, matching prior behavior: this is a heads-up, not a merge gate.
        run: uv run poe security --json || true

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [pr-metadata, size-check, test-coverage-diff, breaking-changes, dependency-review, security-scan]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.pr-metadata.result }}" == "failure" ]] || \
             [[ "${{ needs.size-check.result }}" == "failure" ]] || \
             [[ "${{ needs.test-coverage-diff.result }}" == "failure" ]] || \
             [[ "${{ needs.breaking-changes.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-review.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All required PR checks passed!"
