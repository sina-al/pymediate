name: PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: "pr-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    # Skipping here also skips every job below that depends on its outputs, which is how
    # draft PRs avoid running the heavy jobs (test-coverage-diff, breaking-changes,
    # dependency-review, security-scan) until marked ready for review.
    if: github.event.pull_request.draft == false
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(src/|tests/)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -qE '^(pyproject\.toml|uv\.lock)$'; then
            echo "deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "deps=false" >> "$GITHUB_OUTPUT"
          fi

  pr-metadata:
    name: PR Metadata Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: ]]; then
            echo "Error: PR title must follow conventional commits format"
            echo "Examples: 'feat: add async support', 'fix(handler): correct type validation'"
            exit 1
          fi

      - name: Check PR has description
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          if [ -z "$PR_BODY" ]; then
            echo "Error: PR must have a description"
            exit 1
          fi

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          LINES_CHANGED=$(git diff --stat origin/${{ github.base_ref }}...HEAD | tail -1 | awk '{print $4+$6}')

          echo "Files changed: $FILES_CHANGED"
          echo "Lines changed: $LINES_CHANGED"

          if [ "$FILES_CHANGED" -gt 50 ]; then
            echo "Warning: Large PR with $FILES_CHANGED files changed. Consider splitting."
          fi

          if [ "$LINES_CHANGED" -gt 1000 ]; then
            echo "Warning: Large PR with $LINES_CHANGED lines changed. Consider splitting."
          fi

  test-coverage-diff:
    name: Test Coverage Diff
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras --all-groups

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ --cov=pymediate --cov-report=json --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-pr
          path: coverage.json

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 95
          MINIMUM_ORANGE: 90

  breaking-changes:
    name: Check for Breaking Changes
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for breaking changes in public API
        run: |
          echo "Checking for potential breaking changes..."

          # Check if __init__.py exports changed
          if git diff origin/${{ github.base_ref }}...HEAD -- src/pymediate/__init__.py | grep -E "^[-+].*__all__"; then
            echo "Warning: Changes detected in __all__ exports - potential breaking change"
          fi

          # Check if the ServiceProvider protocol changed
          if git diff origin/${{ github.base_ref }}...HEAD -- src/pymediate/service.py | grep -E "^[-+].*class ServiceProvider"; then
            echo "Warning: Changes detected in ServiceProvider protocol - potential breaking change"
          fi

          # Check if handler signature changed
          if git diff origin/${{ github.base_ref }}...HEAD -- src/pymediate/handler.py | grep -E "^[-+].*class Handler"; then
            echo "Warning: Changes detected in Handler class - potential breaking change"
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.deps == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.deps == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      - name: Install dependencies
        run: |
          uv sync --all-extras --all-groups

      - name: Run safety check
        run: |
          uv pip install --system safety
          safety check --json || true

  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [pr-metadata, size-check, test-coverage-diff, breaking-changes, dependency-review, security-scan]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.pr-metadata.result }}" == "failure" ]] || \
             [[ "${{ needs.size-check.result }}" == "failure" ]] || \
             [[ "${{ needs.test-coverage-diff.result }}" == "failure" ]] || \
             [[ "${{ needs.breaking-changes.result }}" == "failure" ]] || \
             [[ "${{ needs.dependency-review.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "One or more required checks failed"
            exit 1
          fi
          echo "All required PR checks passed!"
