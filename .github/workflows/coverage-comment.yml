name: Coverage Comment

# Companion to pr.yml's Test Coverage Diff job, following py-cov-action's documented
# fork-PR pattern: on fork PRs the pull_request-triggered run has a read-only token and
# can't post the coverage comment, so it uploads the rendered comment as an artifact
# instead. This workflow_run workflow runs in the base repo's context (write token, no
# checkout of fork code — privilege separation per github-actions-security), downloads
# that artifact by run id, and posts it.
# zizmor's dangerous-triggers audit flags workflow_run generically; this workflow uses it
# safely: it never checks out or executes PR code — it only downloads the pre-rendered
# comment artifact and posts it.
on:
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: ["PR"]
    types: [completed]

permissions:
  contents: read

jobs:
  coverage-comment:
    name: Post coverage comment
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    permissions:
      # Read the artifact from the triggering run, comment on the PR.
      actions: read
      contents: read
      pull-requests: write
    steps:
      - name: Post comment
        uses: py-cov-action/python-coverage-comment-action@50d15ff8768f6d897b04e5a0805bd1a98f7096c4 # v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PR_RUN_ID: ${{ github.event.workflow_run.id }}
