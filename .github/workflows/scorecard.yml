name: Scorecard

# OpenSSF Scorecard supply-chain security analysis. Results feed the code-scanning
# dashboard and the public Scorecard badge in README.md.
on:
  schedule:
    - cron: "30 4 * * 1" # weekly, Monday 04:30 UTC
  push:
    branches: [main]
  # Re-score when branch protection / ruleset config changes, since Scorecard rates it.
  branch_protection_rule:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Upload SARIF to code scanning.
      security-events: write
      # Publish results with OIDC verification (required for publish_results: true).
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishes to the OpenSSF REST API so the README badge stays current.
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
