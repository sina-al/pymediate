name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tasks.toml"
      - "pytest.ini"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, stable]
  workflow_dispatch:

concurrency:
  group: "test-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

# Least privilege by default; jobs that need more grant it themselves.
permissions:
  contents: read

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "pyproject.toml"
              - "uv.lock"
              - "tasks.toml"
              - "pytest.ini"
              - ".github/workflows/test.yml"

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.code == 'true')
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - 3.12
          - 3.13
          - 3.14

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Setup uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: |
          uv sync --group test --all-extras

      - name: Test
        run: uv run poe test:cov-xml

  coverage-badge:
    # Stores coverage badge data on the python-coverage-comment-action-data branch
    # (explicitly excluded from the branch-guard ruleset), which the README's shields.io
    # coverage badge reads. PR coverage comments come from pr.yml + coverage-comment.yml,
    # not from this job.
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --group test --all-extras

      - name: Run tests with coverage
        run: uv run poe test:cov-xml

      - name: Save coverage badge data
        uses: py-cov-action/python-coverage-comment-action@50d15ff8768f6d897b04e5a0805bd1a98f7096c4 # v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 95
          MINIMUM_ORANGE: 90

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()
    steps:
      - name: Check test result
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Test matrix failed"
            exit 1
          fi
          echo "Tests passed (or were skipped: no relevant changes)"
