name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs.v2/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs.v2/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege by default; the deploy job grants itself pages/id-token scopes.
permissions:
  contents: read

# One Pages deployment at a time; superseded PR builds are cancelled, but
# in-progress production deployments on main are never cancelled.
concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Site is served from https://sina-al.github.io/pymediate
  NEXT_PUBLIC_BASE_PATH: /pymediate
  NEXT_PUBLIC_SITE_URL: https://sina-al.github.io/pymediate

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs.v2
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          package_json_file: docs.v2/package.json

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs.v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and type-check
        run: |
          pnpm lint
          pnpm types:check

      - name: Build documentation
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs.v2/out/

  deploy:
    name: Deploy documentation
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: documentation
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
