name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  # No paths filter on pull_request: the "Documentation" summary job below is a required
  # status check, so it must always report on PRs — it passes as "skipped" when the changes
  # job detects no docs changes, instead of hanging the PR forever.
  pull_request:
    branches: [main, stable]
  workflow_dispatch:

# Least privilege by default; the deploy job grants itself pages/id-token scopes.
permissions:
  contents: read

# One Pages deployment at a time; superseded PR builds are cancelled, but
# in-progress production deployments on main are never cancelled.
concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # NEXT_PUBLIC_BASE_PATH: /pymediate # if switching back to https://sina-al.github.io/pymediate, uncomment this line
  NEXT_PUBLIC_SITE_URL: https://pymediate.sina-al.uk

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            docs:
              - "docs/**"
              - ".github/workflows/docs.yml"

  build:
    name: Build documentation
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.docs == 'true')
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: docs/package.json

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      # The three pnpm steps below deliberately mirror the docs:install / docs:check /
      # docs:build poe tasks instead of invoking them: this job's toolchain is Node-only,
      # and bootstrapping Python + uv just so poe can shell out to pnpm buys nothing (the
      # non-Python-job carve-out in CLAUDE.md's "poe tasks vs. inline workflow steps").
      # Keep them in sync with tasks.toml.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and type-check
        run: pnpm check

      - name: Build documentation
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/out/

  docs-summary:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: always()
    env:
      BUILD_RESULT: ${{ needs.build.result }}
    steps:
      - name: Check build result
        run: |
          if [[ "$BUILD_RESULT" == "failure" ]]; then
            echo "Documentation build failed"
            exit 1
          fi
          echo "Documentation build passed (or was skipped: no docs changes)"

  deploy:
    name: Deploy documentation
    runs-on: ubuntu-latest
    needs: build
    # always() + explicit result check, not implicit success(): the changes job is skipped
    # on push events, and a skipped job anywhere in the needs chain would skip this job too
    # (this silently disabled Pages deploys for every push until 2026-07-09).
    if: |
      always() &&
      needs.build.result == 'success' &&
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main'
    permissions:
      pages: write # Publish the built static site to GitHub Pages.
      id-token: write # Authenticate the Pages deployment with GitHub OIDC.
    environment:
      name: documentation
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
