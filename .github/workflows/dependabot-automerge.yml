name: Dependabot Auto-merge

# Auto-merges Dependabot PRs that are *patch-level only*, following GitHub's documented
# pattern (fetch-metadata + gh pr merge --auto). Minor and major bumps still wait for the
# maintainer's review. `--auto` respects main-guard: the merge only happens once all
# required checks pass — this never merges a red PR.
#
# Notes for the suspicious reader:
#   - Trigger is plain `pull_request` from a same-repo Dependabot branch; no fork code
#     runs with secrets (Dependabot-triggered runs also only receive Dependabot secrets).
#   - The GITHUB_TOKEN approval satisfies main-guard's 1-approval requirement
#     (require_code_owner_review was dropped for exactly this; only write-access actors
#     can approve, so this doesn't open review to outsiders).
#   - For grouped updates, fetch-metadata reports the *highest* bump in the group, so a
#     group containing anything above patch is left for human review.
on: pull_request

permissions:
  contents: read

jobs:
  automerge:
    name: Auto-merge patch updates
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.repository == 'sina-al/pymediate'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and enable auto-merge
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          NEW_VERSION: ${{ steps.metadata.outputs.new-version }}
        run: |
          # Guard against stale Dependabot metadata. The machine-readable trailer that
          # fetch-metadata parses can lag the actual diff when a PR is recreated: on #36 it
          # reported patch/0.1.5 while the PR really bumped pymediate to 0.2.0 (a minor), and
          # only the disabled "Actions may approve PRs" setting stopped this job auto-merging
          # it. The PR title is regenerated from the real change, so cross-check that the
          # reported new version actually appears in it before trusting the "patch" verdict.
          # A mismatch (or a grouped multi-update title with no single version) falls through
          # to manual review, which is the safe direction.
          nv_esc=$(printf '%s' "$NEW_VERSION" | sed 's/[.]/\\./g')
          if ! printf '%s' "$PR_TITLE" | grep -qE " to ${nv_esc}( |\$)"; then
            echo "::notice::PR title does not confirm new version ${NEW_VERSION}; leaving for manual review."
            exit 0
          fi
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
