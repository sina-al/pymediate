name: Checks

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tasks.toml"
      - "ruff.toml"
      - "mypy.ini"
      - ".github/workflows/checks.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "checks-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "scripts/**"
              - "pyproject.toml"
              - "uv.lock"
              - "tasks.toml"
              - "ruff.toml"
              - "mypy.ini"
              - ".github/workflows/checks.yml"

  check:
    name: Run Checks
    runs-on: ubuntu-latest
    needs: [changes]
    if: |
      always() &&
      (github.event_name != 'pull_request' || needs.changes.outputs.code == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Sync dependencies
        run: |
          uv sync --only-dev

      - name: Format
        run: |
          uv run poe format:check

      - name: Lint
        run: |
          uv run poe lint --output-format=github

      - name: Type check
        run: |
          uv run poe type

  checks-summary:
    name: Checks
    runs-on: ubuntu-latest
    needs: [changes, check]
    if: always()
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.check.result }}" == "failure" ]]; then
            echo "Checks failed"
            exit 1
          fi
          echo "Checks passed (or were skipped: no relevant changes)"
