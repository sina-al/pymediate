name: Checks

on:
  push:
    branches: [main]
    paths: &code-paths
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "tasks.toml"
      - "ruff.toml"
      - "mypy.ini"
      - ".github/workflows/checks.yml"
  pull_request:
    branches: [main]
    paths: *code-paths
  workflow_dispatch:

concurrency:
  group: "checks-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  check:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Sync dependencies
        run: |
          uv sync --only-dev

      - name: Format
        run: |
          uv run poe format:check

      - name: Lint
        run: |
          uv run poe lint --output-format=github

      - name: Type check
        run: |
          uv run poe type
