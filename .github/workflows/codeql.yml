name: CodeQL

# Advanced (workflow-based) CodeQL setup, replacing GitHub's default setup. Default setup does
# not analyze pull requests opened by Dependabot, which meant the main ruleset's code_scanning
# rule could never be satisfied on a Dependabot PR - permanently blocking merge regardless of
# review/checks. A same-repo pull_request-triggered workflow (this file) runs normally for
# Dependabot branches, since only fork PRs have restricted token permissions.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, stable]
  schedule:
    - cron: "30 4 * * 1" # weekly, Monday 04:30 UTC - matches the previous default-setup schedule
  workflow_dispatch:

concurrency:
  group: "codeql-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Upload the analysis results to GitHub code scanning.
    strategy:
      fail-fast: false
      matrix:
        language: [python, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
