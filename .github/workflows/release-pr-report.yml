name: Release PR Report

# Extra reporting and gating scoped only to release PRs (opened by prepare-release.yml on a
# release/vX.Y.Z branch): a per-Python-version test results comment, a dependency vulnerability
# comment, and two required checks — "Examples" (every examples/ project against a wheel built
# from the cut — so a breaking change with stale examples fails BEFORE merge, with no tag
# created and no version burned) and "Release Test Results" (the release test matrix, gated by
# a native job so the check reliably registers against the PR). Regular PRs don't get these -
# they already get a leaner
# check-run-only signal from pr.yml/test.yml, and coverage + the API breaking-change report
# are already covered for every PR (pr.yml's test-coverage-diff job; the release impact report
# embedded in the PR body by prepare-release.yml). Every job here is gated on the head ref so
# this workflow is a no-op (all jobs skipped) for anything that isn't a release branch.

on:
  pull_request:
    # Release PRs target `stable` (two-branch model); the head-ref gates on the jobs below
    # keep this a no-op for anything that isn't a release/vX.Y.Z cut branch.
    branches: [stable]
    types: [opened, synchronize, reopened]

concurrency:
  group: "release-pr-report-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  examples:
    # Required check on stable-guard: examples against a wheel built from this exact cut.
    # Complements (doesn't replace) release.yml's post-TestPyPI examples stage, which
    # validates the real publish-and-install path; this one moves the correctness signal
    # to before the merge, where failure is consequence-free.
    name: Examples
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release/v')
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # hatch-vcs derives the wheel's (dev) version from git tags; a shallow checkout
          # would fall back to 0.0.0+unknown.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Build wheel from the cut
        run: |
          uv sync --only-dev
          uv build

      - name: Run examples against the wheel
        run: |
          uv run poe examples:test --wheel dist/*.whl

  test-results:
    name: Test Results (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release/v')
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --group test --all-extras

      - name: Run tests with JUnit output
        run: uv run poe test:junit

      - name: Upload JUnit results
        if: "!cancelled()"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: junit-${{ matrix.python-version }}
          path: junit.xml

  release-test-results:
    # The required "Release Test Results" check on stable-guard. Deliberately a real job whose
    # own check-run carries that name — NOT the publish-unit-test-result-action's synthesized
    # check-run below. That synthesized check lands on the commit but does not reliably register
    # against a PR's required-check evaluation, which left release PR #51 permanently BLOCKED on
    # an orphaned "Release Test Results" context (all other required checks green, no bypass
    # actor to override). A native job's check-run associates with the PR the same way the
    # "Examples" job above does. Keep this job's name in sync with the required context string.
    name: Release Test Results
    runs-on: ubuntu-latest
    needs: test-results
    if: "!cancelled() && startsWith(github.head_ref, 'release/v')"
    env:
      TEST_RESULT: ${{ needs.test-results.result }}
    steps:
      - name: Require the test matrix to have passed
        run: |
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::Release test matrix did not pass (aggregate result: $TEST_RESULT)."
            exit 1
          fi
          echo "All release test matrix jobs passed."

  publish-test-results:
    name: Publish Test Results
    runs-on: ubuntu-latest
    needs: test-results
    if: "!cancelled() && startsWith(github.head_ref, 'release/v')"
    permissions:
      checks: write # Publish the detailed JUnit report as a non-gating check run.
      pull-requests: write # Attach the detailed JUnit summary to the release PR.
    steps:
      - name: Download JUnit results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: junit-*
          path: junit-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        with:
          files: "junit-results/**/junit.xml"
          # Detail/annotations only — NOT the required gate (that's the release-test-results
          # job above). Named distinctly so it can't collide with the required context.
          check_name: "Release Test Results (report)"
          comment_title: "Test Results"

  vulnerability-audit:
    name: Vulnerability Audit (pip-audit)
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'release/v')
    permissions:
      contents: read
      pull-requests: write # Create or update the release PR's vulnerability report.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync

      - name: Run pip-audit
        # Audits only the shipped dependency tree (pymediate[di] resolved from uv.lock) -
        # dev/test tooling never reaches users and Dependabot already watches the lockfile.
        # Informational, not a merge gate (matches pr.yml's existing security-scan job) - the
        # comment posts regardless of whether vulnerabilities were found.
        run: |
          status=0
          uv run poe security:pip-audit > pip-audit.md || status=$?
          if [ ! -s pip-audit.md ]; then
            if [ "$status" -eq 0 ]; then
              echo "✅ No known vulnerabilities in the shipped dependency tree (\`pymediate[di]\` resolved from \`uv.lock\`)." > pip-audit.md
            else
              echo "⚠️ pip-audit exited with status $status without producing a report — see the job log." > pip-audit.md
            fi
          fi

      - name: Comment results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- release-pr-report:pip-audit -->";
            const report = fs.readFileSync("pip-audit.md", "utf8");
            const body = `${marker}\n## Dependency Vulnerability Audit (pip-audit)\n\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
