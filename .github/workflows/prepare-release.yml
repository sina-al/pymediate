name: Prepare Release

# Release entry point for the two-branch model (see OPERATIONS.md):
#
#   1. Maintainer dispatches this workflow (bump = auto | patch | minor).
#   2. It computes the next version from the last release tag (versions are tag-derived;
#      nothing in the repo changes), force-pushes a zero-commit cut branch
#      release/vX.Y.Z pointing at main's current HEAD, and opens a PR into `stable`.
#      Because `stable` always sits at the last approved cut, that PR's diff is exactly
#      last-release -> proposed release.
#   3. The maintainer reviews (full diff, changelog, impact report, test/security
#      comments) and merges — or closes, which is consequence-free: tag-release.yml
#      deletes the cut branch, and the next dispatch starts clean.
#
# Dispatching requires write access, so only the maintainer can start this. Re-dispatch
# is idempotent: any superseded open release PR is closed and its branch replaced.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump kind (auto = follow release:impact's recommendation)"
        type: choice
        options: [auto, patch, minor]
        default: auto

permissions:
  contents: read

# Release preparation mutates one shared cut branch/PR at a time. Do not cancel an active
# run midway through those mutations; a later dispatch waits and then reconciles state.
concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Open release PR
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived (~1h) installation token for the pymediate-releaser GitHub App.
      # The App has its own bot identity, nothing to rotate, and — unlike GITHUB_TOKEN —
      # a PR it opens still triggers the required pull_request checks.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.PYMEDIATE_RELEASER_CLIENT_ID }}
          # This repository secret authenticates the release App. It intentionally is not
          # tied to an approval environment: workflow_dispatch authorization is the gate.
          private-key: ${{ secrets.PYMEDIATE_RELEASER_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]
          # Push the cut branch (contents) and open/close PRs (pull-requests). Nothing else.
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout code # zizmor: ignore[artipacked]
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Sync dependencies
        run: uv sync --only-dev

      - name: Assess release impact
        run: |
          uv run poe release:impact | tee impact.txt

      - name: Determine bump kind
        id: bump
        env:
          BUMP_INPUT: ${{ inputs.bump }}
        run: |
          if [ "$BUMP_INPUT" = "auto" ]; then
            kind=$(grep -oE 'RECOMMENDATION: (minor|patch)' impact.txt | awk '{print $2}')
            if [ -z "$kind" ]; then
              echo "Could not parse a RECOMMENDATION line from release:impact output" >&2
              exit 1
            fi
          else
            kind="$BUMP_INPUT"
          fi
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          echo "Bump kind: $kind"

      - name: Compute next version
        id: version
        env:
          KIND: ${{ steps.bump.outputs.kind }}
        # Versions are tag-derived (hatch-vcs), so "bumping" is pure arithmetic on the last
        # tag. A version whose tag already exists is burned (e.g. a release that failed
        # after its TestPyPI publish — filenames there are immutable forever), so patch
        # forward past any existing tag until we find a free one.
        run: |
          # Not `git describe`: release tags land on stable's merge commits, which are
          # never ancestors of main, so describe from this (main) checkout would be stuck
          # at the last pre-two-branch tag forever (v0.2.0's PR changelog over-reported
          # because of this). The highest version tag repo-wide is the real last release.
          LAST_TAG=$(git tag --list 'v[0-9]*' --sort=-v:refname | head -1)
          IFS=. read -r MAJOR MINOR PATCH <<< "${LAST_TAG#v}"
          if [ "$KIND" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          while git rev-parse -q --verify "refs/tags/v${MAJOR}.${MINOR}.${PATCH}" >/dev/null; do
            PATCH=$((PATCH + 1))
          done
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Last release: ${LAST_TAG} -> proposed: v${VERSION} (${KIND})"
          {
            echo "version=${VERSION}"
            echo "last_tag=${LAST_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Determine last released tag
        id: last-released
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        # Distinct from LAST_TAG above (which stays the raw last git tag - correct for
        # version arithmetic and for "this PR's diff is everything since X" below, since both
        # are about main's code history, tag-published-or-not). This one is the base for the
        # *changelog* narrative: a tag can exist without a published Release if a previous
        # release.yml run tagged it, reached TestPyPI (burning the version), then failed
        # before create-release. Using the raw last tag as the changelog base would silently
        # drop that burned tag's content from every future release's notes (this happened:
        # v0.7.0 burned, and v0.7.1's notes came out empty because nothing since v0.7.0
        # touched src/pymediate/).
        run: |
          LAST_RELEASED_TAG=$(gh release list --exclude-drafts --exclude-pre-releases \
            --limit 1 --json tagName --jq '.[0].tagName // empty' --repo "$GITHUB_REPOSITORY")
          echo "last_released_tag=${LAST_RELEASED_TAG}" >> "$GITHUB_OUTPUT"
          echo "Last published release: ${LAST_RELEASED_TAG:-<none>}"

      - name: Render changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
          LAST_RELEASED_TAG: ${{ steps.last-released.outputs.last_released_tag }}
        # The explicit `LAST_RELEASED_TAG..` range replaces --unreleased: cliff's "unreleased"
        # means "since the last tag on this history", and release tags aren't on main's
        # history (see the version step). The range works because the tagged merge commit
        # contains main up to the cut. --tag labels the commits as the proposed release. Same
        # commit-type and src/pymediate/** path filtering as the release notes (cliff.toml +
        # release:notes task). --strip all drops both the header and the footer: the
        # footer's compare link targets vX.Y.Z, which isn't tagged until this PR merges, so
        # it would 404 in the PR body (the GitHub Release notes keep it — the tag exists there).
        run: |
          if [ -n "$LAST_RELEASED_TAG" ]; then
            uvx git-cliff "${LAST_RELEASED_TAG}.." --tag "v${VERSION}" \
              --include-path 'src/pymediate/**' --strip all -o changelog.md
          else
            uvx git-cliff --tag "v${VERSION}" \
              --include-path 'src/pymediate/**' --strip all -o changelog.md
          fi
          cat changelog.md

      - name: Close superseded release PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        # A dispatch supersedes any release PR still open for a *different* version (e.g.
        # you re-dispatched with another bump kind, or a burned version moved the number
        # on). Same-version PRs are kept: the branch force-push below updates them in
        # place. tag-release.yml deletes the closed PRs' cut branches.
        run: |
          gh pr list --base stable --state open --json number,headRefName \
            --jq ".[] | select(.headRefName | startswith(\"release/v\")) | select(.headRefName != \"release/v${VERSION}\") | .number" |
          while read -r pr; do
            echo "Closing superseded release PR #${pr}"
            gh pr close "$pr" --comment "Superseded by a new release dispatch (v${VERSION})."
          done

      - name: Push cut branch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # Zero-commit cut: the branch is just a ref to main's HEAD. Force-push makes
        # re-dispatch idempotent — cut branches are machine-owned, never hand-edited.
        run: |
          git push --force origin "HEAD:refs/heads/release/v${VERSION}"

      - name: Open release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
          KIND: ${{ steps.bump.outputs.kind }}
        run: |
          BRANCH="release/v${VERSION}"
          KIND_TITLE=$(awk '{print toupper(substr($0,1,1)) substr($0,2)}' <<< "$KIND")
          REASONS=$(awk '/^RECOMMENDATION:/{f=1; next} f && NF' impact.txt | sed 's/^  - /- /')

          {
            echo "## v${VERSION} — ${KIND_TITLE} release"
            echo
            echo "This PR's diff is everything since \`${LAST_TAG}\` — reviewing it reviews the release."
            echo
            echo "${REASONS}"
            echo
            echo "## Changelog"
            echo
            cat changelog.md
            echo
            echo "### On merge"
            echo "1. \`tag-release.yml\` tags the merge commit \`v${VERSION}\` (the version is tag-derived; nothing else moves)"
            echo "2. \`release.yml\` validates, builds + attests, runs the examples against the built wheel, publishes to TestPyPI, re-runs the examples against it, then pauses at the \`pypi\` environment gate for your final approval — after PyPI, the examples smoke-test the live release before the GitHub Release is created"
            echo
            echo "### To reject"
            echo "Close this PR. The cut branch is deleted automatically and a fresh dispatch starts clean. A version only burns once it reaches TestPyPI."
            echo
            echo "<details>"
            echo "<summary>Full release impact report</summary>"
            echo
            echo '```'
            cat impact.txt
            echo '```'
            echo
            echo "</details>"
          } > pr-body.md

          EXISTING=$(gh pr list --base stable --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing release PR #${EXISTING}"
            gh pr edit "$EXISTING" --title "chore(release): v${VERSION}" --body-file pr-body.md
          else
            gh pr create \
              --title "chore(release): v${VERSION}" \
              --body-file pr-body.md \
              --base stable \
              --head "$BRANCH"
          fi
