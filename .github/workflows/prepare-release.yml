name: Prepare Release

# TEMPORARILY DISABLED — being rewritten for the two-branch release model
# (ops overhaul phase 3, https://github.com/sina-al/pymediate/issues/23).
#
# The previous implementation bumped committed version strings (pyproject.toml +
# __init__.py) and regenerated CHANGELOG.md; both were removed when versioning became
# tag-derived (hatch-vcs). The rewrite opens a zero-commit release PR from a cut branch
# release/vX.Y.Z into the permanent `stable` branch instead.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump kind (auto = follow release:impact's recommendation)"
        type: choice
        options: [auto, patch, minor]
        default: auto

permissions: {}

jobs:
  disabled:
    name: Disabled pending rewrite
    runs-on: ubuntu-latest
    steps:
      - name: Explain and fail
        run: |
          echo "::error::prepare-release is disabled while the release pipeline is rewritten" \
            "for the two-branch model (see issue #23). No release can be prepared until" \
            "ops overhaul phase 3 lands."
          exit 1
