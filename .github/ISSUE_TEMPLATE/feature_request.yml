name: Feature Request
description: Suggest an idea for PyMediate
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
      placeholder: I would like to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
    validations:
      required: false

  - type: textarea
    id: example
    attributes:
      label: Example Usage
      description: Show how you would use this feature
      render: python
      placeholder: |
        from pymediate import Request, RequestHandler

        # Example of how the new feature would work
        class MyRequest(Request[MyResponse]):
            ...
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Is this a breaking change?
      description: Would this require changes to existing code?
      options:
        - "No - backward compatible"
        - "Yes - breaking change"
        - "Not sure"
    validations:
      required: true

  - type: dropdown
    id: willing
    attributes:
      label: Are you willing to contribute?
      description: Would you be interested in implementing this feature?
      options:
        - "Yes, I can submit a PR"
        - "Maybe, with guidance"
        - "No, just suggesting"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples about the feature request here.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this isn't a duplicate
          required: true
        - label: This feature aligns with PyMediate's design philosophy (type safety, minimal boilerplate)
          required: true
        - label: I have read the ARCHITECTURE.md to understand the project goals
          required: false
