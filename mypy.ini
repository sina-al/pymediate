[mypy]
# Global options
# Set to minimum supported Python version (3.12)
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
follow_imports = normal
ignore_missing_imports = True

# Show error codes
show_error_codes = True
show_column_numbers = True

# Per-module options for tests
[mypy-tests.*]
ignore_errors = False
disable_error_code = import-not-found, call-arg, misc, arg-type, override

# NOTE: test snippet files in tests/typing/snippets/errors/ are DESIGNED to fail mypy
# They are used for testing type safety - DO NOT add ignore_errors for them here
# as that would break the test suite.
#
# To prevent red squiggles in VSCode for these files, configure your VSCode settings:
#   1. Open .vscode/settings.json
#   2. Add to "python.linting.mypyArgs": ["--exclude", "tests/typing/snippets/errors"]
#   Or use the Mypy extension's exclude setting in VSCode settings.
#
# This keeps them excluded from IDE checking while still allowing the test suite
# to programmatically verify they fail with the expected errors.
